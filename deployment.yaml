apiVersion: apps/v1
kind: Deployment

metadata:
  name: travel-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: travel-app

  template:
    metadata:
      labels:
        app: travel-app

    spec:
      containers:
      - name: travel-container

        image: chiragdevops/travel-project:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80
